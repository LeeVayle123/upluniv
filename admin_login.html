<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administrateur - UPL University</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }

        .login-wrapper {
            display: flex;
            width: min(780px, 90vw);
            min-height: 520px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.14);
            border-radius: 24px;
            overflow: hidden;
            background: white;
        }

        /* Côté bleu gauche */
        .left-section {
            background: linear-gradient(135deg, navy 0%, #112f60 100%);
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 42%;
        }

        .left-section img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .left-section h1 {
            font-size: 1.9rem;
            margin-bottom: 18px;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .left-section p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 220px;
        }

        .left-section .btn-register {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 10px 28px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.04em;
        }

        .left-section .btn-register:hover {
            cursor: pointer;
        }

        .left-section .btn-register:hover {
            background: white;
            color: #001a4d;
            transform: translateY(-2px);
        }

        /* Côté droit formulaire */
        .right-section {
            background: white;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 58%;
            min-height: 520px;
        }

        .login-form-wrapper {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .login-form-wrapper h2 {
            color: #071b3d;
            font-size: 1.7rem;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .login-form-wrapper > p {
            color: #6b7280;
            margin-bottom: 24px;
            font-size: 0.92rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
            caret-color: red;
        }

        .form-group input:focus {
            outline: none;
            border-color: navy;
            box-shadow: 0 0 0 3px rgba(0, 0, 128, 0.12);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: navy;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: navy;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .btn-login:hover {
            background: #b30000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.25);
        }

        .alert-error {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .social-login {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .social-login p {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        /* Curseur rouge au survol */
        .btn-login:hover,
        .left-section .btn-register:hover,
        .form-group input:hover,
        .form-group input:focus {
            cursor: pointer;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #b30000 0%, #cc0000 100%) !important;
        }

        .left-section .btn-register:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4444;
        }

        .forgot-password a:hover {
            text-decoration: underline;
            color: #cc0000;
        }

        button:hover {
            cursor: pointer;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-size: 1rem;
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: navy;
            color: navy;
            transform: translateY(-2px);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }

            .left-section, .right-section {
                width: 100%;
                min-height: auto;
                padding: 40px 20px;
            }

            .left-section {
                padding: 40px 20px 30px;
            }

            .left-section h1 {
                font-size: 1.8rem;
            }

            .login-form-wrapper h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Côté gauche bleu -->
        <div class="left-section">
            <img src="{{ url_for('static', filename='logo_upl.png') }}" alt="Logo UPL">
            <h1>Soyez le bien venu !</h1>
            <p>Connectez-vous avec vos informations personnelles<br>Pas de compte ?</p>
            <a href="/register" class="btn-register">S'inscrire</a>
        </div>

        <!-- Côté droit formulaire -->
        <div class="right-section">
            <div class="login-form-wrapper">
                <h2>Se connecter</h2>
                <p>Entrez vos identifiants pour accéder à l'interface administrateur</p>

                {% if error %}
                <div class="alert-error">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user me-2" style="color: navy;"></i>Nom d'utilisateur
                        </label>
                        <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock me-2" style="color: navy;"></i>Mot de passe
                        </label>
                        <input type="password" id="password" name="password" placeholder="Mot de passe" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="btn-login">SE CONNECTER</button>

                <div class="social-login">
                    <p>BY M.LEE L'AMERICAI<br>UPL</p>
                    <div class="social-buttons">
                        <a href="#" class="social-btn" title="Google">
                            <i class="fab fa-google" style="color: #b30000;"></i>
                        </a>
                        <a href="#" class="social-btn" title="Facebook">
                            <i class="fab fa-facebook-f" style="color: #3b5998;"></i>
                        </a>
                        <a href="#" class="social-btn" title="GitHub">
                            <i class="fab fa-github" style="color: #333;"></i>
                        </a>
                        <a href="#" class="social-btn" title="LinkedIn">
                            <i class="fab fa-linkedin-in" style="color: #0077b5;"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
