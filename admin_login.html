<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administrateur - UPL University</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f5f5f5;
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-height: 100vh;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
        }

        /* Côté bleu gauche */
        .left-section {
            background: linear-gradient(135deg, #001a4d 0%, #003d99 100%);
            color: white;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 40%;
            min-height: 500px;
        }

        .left-section img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .left-section h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .left-section p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .left-section .btn-register {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .left-section .btn-register:hover {
            background: white;
            color: #001a4d;
            transform: translateY(-2px);
        }

        /* Côté droit formulaire */
        .right-section {
            background: white;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 60%;
            min-height: 500px;
        }

        .login-form-wrapper {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .login-form-wrapper h2 {
            color: #001a4d;
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .login-form-wrapper > p {
            color: #999;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #001a4d;
            box-shadow: 0 0 0 3px rgba(0, 26, 77, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #001a4d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #001a4d 0%, #003d99 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 26, 77, 0.3);
        }

        .alert-error {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .social-login {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .social-login p {
            color: #999;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-size: 1rem;
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: #001a4d;
            color: #001a4d;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }

            .left-section, .right-section {
                width: 100%;
                min-height: auto;
                padding: 40px 20px;
            }

            .left-section {
                padding: 40px 20px 30px;
            }

            .left-section h1 {
                font-size: 1.8rem;
            }

            .login-form-wrapper h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Côté gauche bleu -->
        <div class="left-section">
            <img src="{{ url_for('static', filename='logo_upl.png') }}" alt="Logo UPL">
            <h1>Hello welcome</h1>
            <p>Bienvenue sur le système de gestion UPL<br>Connexion réservée aux administrateurs</p>
            <a href="/register" class="btn-register">Register</a>
        </div>

        <!-- Côté droit formulaire -->
        <div class="right-section">
            <div class="login-form-wrapper">
                <h2>login</h2>
                <p>Connectez-vous à votre compte administrateur</p>

                {% if error %}
                <div class="alert-error">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user me-2" style="color: #001a4d;"></i>Nom d'utilisateur
                        </label>
                        <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" required>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock me-2" style="color: #001a4d;"></i>Mot de passe
                        </label>
                        <input type="password" id="password" name="password" placeholder="Mot de passe" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">mot de passe oublier</a>
                    </div>

                    <button type="submit" class="btn-login">LOGIN</button>
                </form>

                <div class="social-login">
                    <p>BY M.LEE L'AMERICAIN</p>
                    <div class="social-buttons">
                        <a href="#" class="social-btn" title="Google">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="social-btn" title="Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="#" class="social-btn" title="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
