<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Admin - UPL Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success-bg: #ecfdf5;
            --success-text: #059669;
            --warning-bg: #fffbeb;
            --warning-text: #d97706;
            --danger-bg: #fef2f2;
            --danger-text: #dc2626;
            --info-bg: #eff6ff;
            --info-text: #2563eb;
            --neutral-bg: #f8fafc;
            --neutral-text: #64748b;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 40px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* En-tête */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 35px auto;
        }
        .header h1 {
            margin: 0;
            color: var(--primary);
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i { color: var(--accent); }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        .back-btn:hover { /* Clicable avec animation */
            background: var(--neutral-bg);
            border-color: #cbd5e1;
            box-shadow: var(--shadow-md);
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Composants des Facultés */
        .faculties-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        .faculty-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .faculty-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--neutral-text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tabs-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .grid-tech {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        .year-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--neutral-bg);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .year-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
        }
        .inner-tabs {
            display: flex;
            gap: 6px;
        }

        /* Onglets clicables */
        .tab-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            border-color: #cbd5e1;
            background: var(--neutral-bg);
        }
        .tab-btn.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 2px 4px rgba(15, 23, 42, 0.2);
        }

        /* Filtres */
        .filters-bar {
            background: var(--surface);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--primary);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: var(--neutral-bg);
        }
        .search-input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .refresh-btn {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .refresh-btn:hover {
            background: var(--accent-hover);
        }
        .refresh-btn:active {
            transform: scale(0.98);
        }

        /* Table Principale (Pas d'animations sur le conteneur statique) */
        .table-container {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            background: #ffffff;
        }
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            background: var(--neutral-bg);
            color: var(--neutral-text);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-size: 0.95rem;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        
        /* Styles de Ligne */
        .row-fraude { background-color: #fffbfa; }
        .row-hors-zone { background-color: #fffbfa; }
        
        /* Typographie de table */
        .time-cell { font-weight: 600; color: var(--neutral-text); font-variant-numeric: tabular-nums; }
        .mat-cell { font-weight: 700; color: var(--primary); }
        .name-cell { font-weight: 600; }
        
        /* Badges Minimalistes (Pas d'animations non plus, design propre) */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
        .badge i { font-size: 0.8rem; }
        
        /* Couleurs de badges par statut */
        .badge.b-fraude { background: var(--danger-bg); color: var(--danger-text); border: 1px solid #fecaca; }
        .badge.b-confirme { background: var(--success-bg); color: var(--success-text); border: 1px solid #a7f3d0; }
        .badge.b-entree { background: var(--info-bg); color: var(--info-text); border: 1px solid #bfdbfe; }
        .badge.b-sortie { background: var(--neutral-bg); color: var(--neutral-text); border: 1px solid var(--border); }
        .badge.b-hors-zone { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }

        /* Colonne de Statut */
        .status-danger { color: var(--danger-text); font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .status-muted { color: var(--neutral-text); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .details-muted { color: var(--neutral-text); font-size: 0.85rem; font-weight: 500;}

        /* Rendu Vide */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--surface);
        }
        .empty-state i {
            font-size: 3.5rem;
            color: #cbd5e1;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            color: var(--primary);
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 8px 0;
        }
        .empty-state p { margin: 0; color: var(--neutral-text); font-size: 0.95rem; }

    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fa-solid fa-timeline"></i> Vue Chronologique</h1>
        <a href="/admin/general_dashboard" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Retour</a>
    </div>

    <div class="main-container">
        <!-- ===== ONGLETS DE FILTRAGE ===== -->
        <div class="faculties-wrapper">
            <!-- Section IAGE -->
            <div class="faculty-card">
                <div class="faculty-label">
                    <i class="fas fa-graduation-cap"></i> Filière IAGE
                </div>
                <div class="tabs-row">
                    <button class="tab-btn active" data-promo="" onclick="switchTab(this)">Vue Globale</button>
                    <button class="tab-btn" data-promo="bac1_IAGE" onclick="switchTab(this)">BAC 1</button>
                    <button class="tab-btn" data-promo="bac2_IAGE" onclick="switchTab(this)">BAC 2</button>
                    <button class="tab-btn" data-promo="bac3_IAGE" onclick="switchTab(this)">BAC 3</button>
                </div>
            </div>

            <!-- Section TECHNOLOGIE -->
            <div class="faculty-card">
                <div class="faculty-label">
                    <i class="fas fa-microchip"></i> Parcours Technologie
                </div>
                <div class="grid-tech">
                    <div class="year-row">
                        <span class="year-label">BAC 1</span>
                        <div class="inner-tabs">
                            <button class="tab-btn" data-promo="bac1_tech_IA" onclick="switchTab(this)">IA</button>
                            <button class="tab-btn" data-promo="bac1_tech_GL" onclick="switchTab(this)">GL</button>
                            <button class="tab-btn" data-promo="bac1_tech_SI" onclick="switchTab(this)">SI</button>
                        </div>
                    </div>
                    <div class="year-row">
                        <span class="year-label">BAC 2</span>
                        <div class="inner-tabs">
                            <button class="tab-btn" data-promo="bac2_tech_IA" onclick="switchTab(this)">IA</button>
                            <button class="tab-btn" data-promo="bac2_tech_GL" onclick="switchTab(this)">GL</button>
                            <button class="tab-btn" data-promo="bac2_tech_SI" onclick="switchTab(this)">SI</button>
                        </div>
                    </div>
                    <div class="year-row">
                        <span class="year-label">BAC 3</span>
                        <div class="inner-tabs">
                            <button class="tab-btn" data-promo="bac3_tech_IA" onclick="switchTab(this)">IA</button>
                            <button class="tab-btn" data-promo="bac3_tech_GL" onclick="switchTab(this)">GL</button>
                            <button class="tab-btn" data-promo="bac3_tech_SI" onclick="switchTab(this)">SI</button>
                        </div>
                    </div>
                    <div class="year-row">
                        <span class="year-label">BAC 4</span>
                        <div class="inner-tabs">
                            <button class="tab-btn" data-promo="bac4_tech_IA" onclick="switchTab(this)">IA</button>
                            <button class="tab-btn" data-promo="bac4_tech_GL" onclick="switchTab(this)">GL</button>
                            <button class="tab-btn" data-promo="bac4_tech_SI" onclick="switchTab(this)">SI</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="filters-bar">
            <input type="text" id="search" class="search-input" placeholder="Recherche rapide par nom ou matricule..." onkeyup="filterTimelines()">
            <button class="refresh-btn" onclick="fetchData()"><i class="fa-solid fa-rotate-right"></i> Actualiser</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <i class="fa-solid fa-list-check" style="color: var(--accent);"></i> Registre des Mouvements
            </div>
            
            <div class="table-wrapper">
                <table id="main-table">
                    <thead>
                        <tr>
                            <th>Heure</th>
                            <th>Matricule</th>
                            <th>Étudiant</th>
                            <th>Événement</th>
                            <th>Statut</th>
                            <th>Informations</th>
                        </tr>
                    </thead>
                    <tbody id="timeline-body">
                        <!-- Rempli par JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="timeline-empty" class="empty-state" style="display: none;">
                <i class="fa-regular fa-folder-open"></i>
                <h3>Aucun mouvement enregistré</h3>
                <p>Les données apparaîtront ici au fur et à mesure.</p>
            </div>
        </div>
    </div>

    <script>
        let activePromo = "";

        function switchTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            activePromo = btn.dataset.promo || "";
            fetchData();
        }

        function getStyleClassForEvent(status) {
            if (status === 'fraude') return 'b-fraude';
            if (status === 'confirmé') return 'b-confirme';
            if (status.includes('entrée')) return 'b-entree';
            if (status.includes('hors_zone')) return 'b-hors-zone';
            return 'b-sortie'; // Default or 'sortie'
        }
        
        function getIconForEvent(status) {
            if (status.includes('entrée')) return 'fa-arrow-right-to-bracket';
            if (status.includes('sortie')) return 'fa-arrow-right-from-bracket';
            if (status.includes('fraude')) return 'fa-triangle-exclamation';
            if (status.includes('confirmé')) return 'fa-check';
            if (status.includes('hors zone')) return 'fa-location-dot';
            return 'fa-circle-info';
        }

        function fetchData() {
            let url = '/api/admin/timeline';
            if (activePromo) url += '?promotion=' + activePromo;
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    renderTimeline(data);
                })
                .catch(e => console.error('Erreur:', e));
        }

        function renderTimeline(data) {
            const tbody = document.getElementById('timeline-body');
            const emptyMsg = document.getElementById('timeline-empty');
            const mainTable = document.getElementById('main-table');
            tbody.innerHTML = '';

            let allEvents = [];
            const studentsInfo = {};

            if(data.presences) {
                data.presences.forEach(p => {
                    studentsInfo[p.matricule] = p; 
                    
                    let statClass = p.type_presence ? p.type_presence.toLowerCase() : 'inconnu';
                    let isFraud = p.status_geoloc && p.status_geoloc.toLowerCase().includes('fraude');
                    if(isFraud) statClass = 'fraude';

                    allEvents.push({
                        matricule: p.matricule || 'N/A',
                        nom_complet: `${p.nom || ''} ${p.prenom || ''}`.trim(),
                        label: p.type_presence || 'Action',
                        time: p.date_inscription,
                        status: statClass,
                        details: p.status_geoloc || '-'
                    });
                });
            }

            if(data.reports) {
                data.reports.forEach(r => {
                    let info = studentsInfo[r.matricule] || { nom: "Inconnu", prenom: "" };
                    let statutClass = (r.result || "inconnu").replace(' ', '_').toLowerCase();
                    if(statutClass.includes('fraude')) statutClass = 'fraude';
                    
                    allEvents.push({
                        matricule: r.matricule || 'N/A',
                        nom_complet: `${info.nom || ''} ${info.prenom || ''}`.trim(),
                        label: `Audit de présence`,
                        time: r.timestamp,
                        status: statutClass,
                        details: r.reason || `Test (${(r.result || 'Système').toUpperCase()})`
                    });
                });
            }

            // Tri par date décroissante
            allEvents.sort((a, b) => new Date(b.time) - new Date(a.time));

            if (allEvents.length === 0) {
                mainTable.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            } else {
                mainTable.style.display = 'table';
                emptyMsg.style.display = 'none';
            }

            allEvents.forEach(e => {
                const dateObj = new Date(e.time);
                const timeStr = isNaN(dateObj) ? "-" : dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                const iconClass = getIconForEvent(e.status);
                const badgeClass = getStyleClassForEvent(e.status);
                
                // Logique conditionnelle pour la ligne et le statut global
                let rowClass = "";
                let statusHtml = "";
                
                if(e.status === 'fraude') {
                    rowClass = "row-fraude";
                    statusHtml = `<span class="status-danger"><i class="fa-solid fa-circle-exclamation"></i> Alerte Fraude</span>`;
                } else if(e.status.includes('hors_zone')) {
                    rowClass = "row-hors-zone";
                    statusHtml = `<span class="status-muted"><i class="fa-solid fa-circle-info"></i> Hors périmètre</span>`;
                } else {
                    statusHtml = `<span class="status-muted">${e.status.charAt(0).toUpperCase() + e.status.slice(1)}</span>`;
                }
                
                const tr = document.createElement('tr');
                tr.className = `timeline-row ${rowClass}`;
                tr.setAttribute('data-search', (e.nom_complet + " " + e.matricule).toLowerCase());
                
                tr.innerHTML = `
                    <td class="time-cell">${timeStr}</td>
                    <td class="mat-cell">${e.matricule}</td>
                    <td class="name-cell">${e.nom_complet}</td>
                    <td><span class="badge ${badgeClass}"><i class="fa-solid ${iconClass}"></i> ${e.label}</span></td>
                    <td>${statusHtml}</td>
                    <td class="details-muted">${e.details}</td>
                `;
                tbody.appendChild(tr);
            });
            
            filterTimelines(); 
        }

        function filterTimelines() {
            const query = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('.timeline-row');
            rows.forEach(row => {
                if(row.getAttribute('data-search').includes(query)) {
                    row.style.display = 'table-row';
                } else {
                    row.style.display = 'none';
                }
            });
        }

        fetchData();
        setInterval(fetchData, 15000); // 15 secondes pour économiser les requêtes réseau
    </script>
</body>
</html>
