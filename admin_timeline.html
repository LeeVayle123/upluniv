<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Admin - UPL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: navy;
            --success: #16a34a;
            --warning: #ea580c;
            --danger: #dc2626;
            --bg: #f8fafc;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .timeline-item { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #e2e8f0; align-items: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-confirmé { background: #dcfce7; color: #166534; }
        .badge-hors_zone { background: #fee2e2; color: #991b1b; }
        .badge-breaktime { background: #fef9c3; color: #854d0e; }
        .badge-fraude { background: #450a0a; color: white; }
        .badge-entree { background: #e0f2fe; color: #075985; }
        .badge-sortie { background: #f1f5f9; color: #475569; }
        .student-row { display: grid; grid-template-columns: 1fr 2fr 1fr; border-bottom: 2px solid #f1f5f9; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Timeline Temps Réel</h1>
        <a href="/presences" style="text-decoration: none; color: navy; font-weight: 600;">Retour</a>
    </div>

    <div class="card">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="search" placeholder="Rechercher un matricule..." style="padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; flex: 1;">
            <button onclick="fetchData()" style="padding: 10px 20px; background: navy; color: white; border: none; border-radius: 8px; cursor: pointer;">Rafraîchir</button>
        </div>

        <div id="timeline-container">
            <!-- Les données seront insérées ici -->
            <p style="text-align: center; color: #64748b;">Chargement des données...</p>
        </div>
    </div>

    <script>
        function fetchData() {
            fetch('/api/admin/timeline')
                .then(res => res.json())
                .then(data => {
                    renderTimeline(data);
                });
        }

        function renderTimeline(data) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            // Grouper par étudiant
            const students = {};

            data.presences.forEach(p => {
                if (!students[p.matricule]) students[p.matricule] = { info: p, events: [] };
                students[p.matricule].events.push({
                    type: 'presence',
                    label: p.type_presence,
                    time: p.date_inscription,
                    status: p.type_presence.toLowerCase(),
                    details: p.status_geoloc
                });
            });

            data.reports.forEach(r => {
                if (!students[r.matricule]) return; // Pas d'entrée aujourd'hui ?
                students[r.matricule].events.push({
                    type: 'check',
                    label: `Suivi ${r.scheduled_time}`,
                    time: r.timestamp,
                    status: r.result.replace(' ', '_'),
                    details: r.reason || `Distance: ${Math.round(r.distance)}m`
                });
            });

            const sortedMatricules = Object.keys(students).sort();

            sortedMatricules.forEach(mat => {
                const s = students[mat];
                const row = document.createElement('div');
                row.className = 'card';
                row.style.padding = '15px';
                
                let eventsHtml = '';
                // Trier les événements par heure
                s.events.sort((a, b) => new Date(a.time) - new Date(b.time));

                s.events.forEach(e => {
                    const timeStr = new Date(e.time).toLocaleTimeString();
                    eventsHtml += `
                        <div class="timeline-item">
                            <span style="width: 80px; font-weight: bold;">${timeStr}</span>
                            <span class="badge badge-${e.status}">${e.label}</span>
                            <span style="font-size: 0.85rem; color: #64748b;">${e.details}</span>
                        </div>
                    `;
                });

                row.innerHTML = `
                    <div style="font-weight: 800; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 10px;">
                        ${s.info.nom} ${s.info.prenom} (${mat}) - ${s.info.promotion}
                    </div>
                    <div>${eventsHtml}</div>
                `;
                container.appendChild(row);
            });

            if (sortedMatricules.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px; color: #64748b;">Aucune activité aujourd\'hui.</p>';
            }
        }

        fetchData();
        setInterval(fetchData, 10000); // Rafraîchir toutes les 10 secondes
    </script>
</body>
</html>
