<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Dashboard | UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    {% include 'sidebar.html' %}

    <!-- Zone de contenu principal -->
    <main class="main-content">
        <!-- En-tête -->
        <header class="header">
            <div class="header-title-section">
                <h1>Dashboard</h1>
                <span class="university-title">Protestant University of Lubumbashi</span>
            </div>
            <div class="header-right">
                <!-- Compteur de rafraîchissement au coin en haut à droite -->
                <div class="timer-badge">
                    <i class="fa-solid fa-sync fa-spin"></i>
                    <span id="refresh-timer">15s</span>
                </div>
                <div class="user-profile">
                    <span>Bienvenue, Admin UPL</span>
                    <div class="profile-avatar">U</div>
                </div>
            </div>
        </header>

        <!-- Cartes Statistiques en Haut (4 Colonnes) -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <i class="fa-solid fa-user-group"></i>
                    <span>Students Registered</span>
                </div>
                <div class="stat-value" id="stat-total-students">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <i class="fa-solid fa-door-open"></i>
                    <span>Today's Arrivals</span>
                </div>
                <div class="stat-value" id="stat-entrees">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Outside Zone</span>
                </div>
                <div class="stat-value" id="stat-hors-zone" style="color: #ef4444;">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Detected Frauds</span>
                </div>
                <div class="stat-value" id="stat-fraudes" style="color: #ef4444;">...</div>
            </div>
        </section>

        <!-- Grille du milieu (Suivi et Classement) -->
        <section class="dashboard-grid">
            <!-- Student Tracking -->
            <div class="grid-card">
                <h2 class="card-title">Student Tracking</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Level</th>
                            <th>Type</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="activity-body">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Ranking Evolution -->
            <div class="grid-card">
                <h2 class="card-title">Ranking Progress</h2>
                <ul class="ranking-list" id="ranking-list-container">
                    <!-- Loaded dynamically -->
                </ul>
            </div>
        </section>

        <!-- Grille du bas (Progression et Activité - Largeur partagée à 50% chacune) -->
        <section class="bottom-grid">
            <!-- Progress Chart -->
            <div class="grid-card">
                <h2 class="card-title">Progress</h2>
                <canvas id="statusPieChart" height="200"></canvas>
            </div>

            <!-- Gender Distribution -->
            <div class="grid-card">
                <h2 class="card-title">Gender Distribution</h2>
                <canvas id="genderChart" height="200"></canvas>
            </div>

            <!-- Activity Chart -->
            <div class="grid-card">
                <h2 class="card-title">Activity</h2>
                <canvas id="attendanceChart" height="200"></canvas>
            </div>
        </section>
    </main>

    <script>
        let attendanceChart, statusPieChart, genderChart;

        async function updateStats() {
            try {
                const response = await fetch('/api/admin/stats_summary');
                const data = await response.json();

                // Fallback demo when the database is empty
                const isDatabaseEmpty = !data.total_students && (!data.history || data.history.length === 0);
                
                const totalStudents = isDatabaseEmpty ? 124 : data.total_students;
                const entreesToday = isDatabaseEmpty ? 82 : data.entrees_today;
                const horsZoneToday = isDatabaseEmpty ? 12 : data.hors_zone_today;
                const fraudesToday = isDatabaseEmpty ? 3 : data.fraudes_today;

                // Update cards (on affiche 0 si c'est réellement vide mais on peut garder la logique dynamique)
                document.getElementById('stat-total-students').textContent = data.total_students || 0;
                document.getElementById('stat-entrees').textContent = data.entrees_today || 0;
                document.getElementById('stat-hors-zone').textContent = data.hors_zone_today || 0;
                document.getElementById('stat-fraudes').textContent = data.fraudes_today || 0;

                // Labels & données pour l'activité
                let chartLabels = [];
                let chartData = [];
                if (isDatabaseEmpty) {
                    chartLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    chartData = [45, 62, 85, 71, 95, 82];
                } else {
                    chartLabels = data.history.map(h => h.label);
                    chartData = data.history.map(h => h.count);
                }

                // Update Line Chart (Activité)
                const ctxLine = document.getElementById('attendanceChart').getContext('2d');
                if (attendanceChart) attendanceChart.destroy();
                attendanceChart = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: 'Total Attendance',
                            data: chartData,
                            borderColor: '#000b76',
                            backgroundColor: 'rgba(0, 11, 118, 0.05)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2.5,
                            pointBackgroundColor: '#000b76',
                            pointBorderColor: 'white',
                            pointBorderWidth: 1.5,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Outfit', size: 10 } } },
                            x: { grid: { display: false }, ticks: { font: { family: 'Outfit', size: 10 } } }
                        }
                    }
                });

                // Update Column Chart (Progress)
                const ctxBar = document.getElementById('statusPieChart').getContext('2d');
                if (statusPieChart) statusPieChart.destroy();
                statusPieChart = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['Registered', 'Arrivals', 'Outside Zone', 'Frauds'],
                        datasets: [{
                            data: [totalStudents, entreesToday, horsZoneToday, fraudesToday],
                            backgroundColor: ['#000b76', '#3b82f6', '#93c5fd', '#fb7185'],
                            borderRadius: 6,
                            borderWidth: 0,
                            barThickness: 20
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Outfit', size: 10 } } },
                            x: { grid: { display: false }, ticks: { font: { family: 'Outfit', size: 10, weight: '500' } } }
                        }
                    }
                });

                // Gender distribution chart
                const maleCount = data.male_count || 0;
                const femaleCount = data.female_count || 0;
                const ctxGender = document.getElementById('genderChart').getContext('2d');
                if (genderChart) genderChart.destroy();
                genderChart = new Chart(ctxGender, {
                    type: 'doughnut',
                    data: {
                        labels: ['Male', 'Female'],
                        datasets: [{
                            data: [maleCount, femaleCount],
                            backgroundColor: ['#3b82f6', '#ec4899'],
                            borderColor: '#ffffff',
                            borderWidth: 2,
                            hoverOffset: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { font: { family: 'Outfit', size: 11 } } }
                        }
                    }
                });

                // Update Recent Activity (Fetch from timeline API)
                const activityRes = await fetch('/api/admin/timeline');
                const activityData = await activityRes.json();
                const tbody = document.getElementById('activity-body');
                tbody.innerHTML = '';

                // Classement dynamique à remplir également
                const rankingContainer = document.getElementById('ranking-list-container');
                rankingContainer.innerHTML = '';

                // Show last 6 entries in activity
                const recentPresences = activityData.presences.slice(0, 6);
                recentPresences.forEach(p => {
                    const sg = p.status_geoloc || '';
                    let badgeClass = 'badge-active';
                    let statusLabel = 'Active';
                    if (sg.includes('Fraude') || sg.includes('Hors Zone') || sg.includes('Outside Zone')) {
                        badgeClass = 'badge-inactive';
                        statusLabel = 'Outside Zone';
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${p.nom} ${p.prenom}</strong></td>
                            <td>${p.promotion}</td>
                            <td>${p.type_presence}</td>
                            <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
                        </tr>
                    `;
                });

                // Remplir la liste d'évolution (Exemples / Simulation à partir des données de présence réelles)
                const topStudents = recentPresences.slice(0, 2);
                topStudents.forEach((student, index) => {
                    rankingContainer.innerHTML += `
                        <li class="ranking-item">
                            <div class="ranking-info">
                                <div class="ranking-number">${index + 1}</div>
                                <span class="ranking-name">${student.nom.toLowerCase()} ${student.prenom.toLowerCase()}</span>
                            </div>
                            <div class="ranking-value">
                                <i class="fa-solid fa-caret-up"></i>
                                <span>100.0%</span>
                            </div>
                        </li>
                    `;
                });

                if (topStudents.length === 0) {
                    rankingContainer.innerHTML = '<li class="ranking-item"><span class="ranking-name" style="color: var(--text-muted)">No data today</span></li>';
                }

            } catch (err) {
                console.error("Erreur stats:", err);
            }
        }

        // Logic for progressive countdown
        const timerDisplay = document.getElementById('refresh-timer');

        let currentDelay = sessionStorage.getItem('dashboard_current_delay')
            ? parseInt(sessionStorage.getItem('dashboard_current_delay'))
            : 15;

        let timeLeft = sessionStorage.getItem('dashboard_time_left')
            ? parseInt(sessionStorage.getItem('dashboard_time_left'))
            : currentDelay;

        function getNextDelay(delay) {
            if (delay === 15) return 60;
            if (delay >= 3600) return 15;
            return delay + 60;
        }

        function startCountdown() {
            setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) {
                    updateStats();
                    currentDelay = getNextDelay(currentDelay);
                    timeLeft = currentDelay;
                    sessionStorage.setItem('dashboard_current_delay', currentDelay);
                }
                sessionStorage.setItem('dashboard_time_left', timeLeft);
                timerDisplay.textContent = timeLeft + "s";
            }, 1000);
        }

        // Initialiser
        timerDisplay.textContent = timeLeft + "s";
        updateStats();
        startCountdown();
    </script>
</body>

</html>
