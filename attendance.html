<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présence - UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: navy;
            --primary-dark: red;
            --text-main: #1e293b;
            --text-muted: red;
            --radius-lg: 16px;
            --radius-md: 14px;
            --transition: all 0.2s ease;
        }

        .logo-container {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .university-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .side-panel {
            flex: 0.7;
            background: navy;
            padding: 24px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .brand-desc {
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .btn-outline {
            display: inline-flex;
            padding: 6px 16px;
            border: 1.5px solid rgb(252, 252, 252);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .btn-outline:hover {
            background: red;
            border-color: white;
        }

        .form-panel {
            flex: 1.3;
            padding: 24px 28px;
            background: white;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 550px) {
            .container {
                flex-direction: column;
                max-width: 350px;
            }

            .side-panel {
                padding: 20px;
                text-align: center;
                align-items: center;
            }

            .form-panel {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <aside class="side-panel">
            <h1 class="brand-title">UPL</h1>
            <p class="brand-desc">Scanner ou saisir votre matricule pour la présence.</p>
        </aside>

        <main class="form-panel">
            <h2 class="form-title">Présence</h2>
            
            <!-- Zone d'affichage des infos de l'étudiant trouvées via AJAX -->
                <div id="student-info-badge" style="display: none; background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid navy;">
                    <p id="info-name" style="font-weight: 700; font-size: 0.9rem; color: navy;"></p>
                    <p id="info-promo" style="font-size: 0.75rem; color: #64748b;"></p>
                </div>

                <!-- Message de succès (Ticket) -->
                <div id="success-ticket" style="display: none; background: #dcfce7; padding: 20px; border-radius: 16px; border: 2px solid #16a34a; text-align: center; margin-bottom: 15px; animation: slideDown 0.4s ease-out;">
                    <div style="font-size: 2.5rem; margin-bottom: 10px;">✅</div>
                    <h3 style="color: #15803d; margin-bottom: 5px;">Présence Enregistrée !</h3>
                    <p id="ticket-details" style="font-size: 0.85rem; color: #166534;"></p>
                    <div style="margin-top: 15px; font-size: 0.75rem; color: #15803d; font-weight: 600;">
                        Prochain scan possible dans : <span id="cooldown-timer">30</span>s
                    </div>
                </div>

                <form action="/check_attendance" method="post" id="attendance-form" style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="hidden" name="device_signature" id="device_signature">
                    <input type="hidden" name="latitude" id="latitude">
                    <input type="hidden" name="longitude" id="longitude">
                    
                    <div class="form-group">
                        <label class="form-label" for="matricule">Matricule</label>
                        <input type="text" id="matricule" name="matricule" class="form-input" required
                            placeholder="Ex: 24-1234" autofocus autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="type_presence">Type de pointage</label>
                        <select id="type_presence" name="type_presence" class="form-input">
                            <option value="Entrée">✅ Entrée (Début de cours)</option>
                            <option value="Sortie">🚪 Sortie (Fin de cours)</option>
                        </select>
                    </div>

                    <div id="gps-status" style="font-size: 0.7rem; color: #64748b; margin-bottom: 5px;">
                        📍 Localisation en cours...
                    </div>

                    <div id="form-loading" style="display: none; text-align: center; font-size: 0.75rem; color: navy;">
                        <span>🔍 Vérification...</span>
                    </div>

                    <button type="submit" class="btn-submit" id="submit-btn" disabled>Valider ma présence</button>
                </form>
            </main>

            <script>
                // 1. Géolocalisation
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(function(position) {
                        document.getElementById('latitude').value = position.coords.latitude;
                        document.getElementById('longitude').value = position.coords.longitude;
                        document.getElementById('gps-status').innerHTML = "📍 Position capturée avec succès";
                        document.getElementById('gps-status').style.color = "#16a34a";
                    }, function(error) {
                        document.getElementById('gps-status').innerHTML = "⚠️ GPS non activé (recommandé)";
                        document.getElementById('gps-status').style.color = "#dc2626";
                    });
                }

                // 2. Signature de l'appareil
                function generateDeviceSignature() {
                    return "SIG-" + Math.random().toString(16).slice(2, 10).toUpperCase();
                }
                document.getElementById('device_signature').value = generateDeviceSignature();

                // 3. Recherche étudiant et Cooldown
                const matriculeInput = document.getElementById('matricule');
                const badge = document.getElementById('student-info-badge');
                const infoName = document.getElementById('info-name');
                const infoPromo = document.getElementById('info-promo');
                const submitBtn = document.getElementById('submit-btn');
                const loading = document.getElementById('form-loading');
                const form = document.getElementById('attendance-form');
                const ticket = document.getElementById('success-ticket');
                const ticketDetails = document.getElementById('ticket-details');
                const timerSpan = document.getElementById('cooldown-timer');

                let lookupTimeout;

                matriculeInput.addEventListener('input', function() {
                    const matricule = this.value.trim();
                    clearTimeout(lookupTimeout);
                    if (matricule.length < 3) {
                        badge.style.display = 'none';
                        submitBtn.disabled = true;
                        return;
                    }
                    lookupTimeout = setTimeout(() => {
                        loading.style.display = 'block';
                        fetch(`/api/student/${matricule}`)
                            .then(res => res.json())
                            .then(data => {
                                loading.style.display = 'none';
                                if (data.error) throw new Error();
                                infoName.textContent = `${data.nom} ${data.prenom}`;
                                infoPromo.textContent = `${data.promotion} | ${data.faculte}`;
                                badge.style.display = 'block';
                                submitBtn.disabled = false;
                            })
                            .catch(() => {
                                loading.style.display = 'none';
                                badge.style.display = 'none';
                                submitBtn.disabled = true;
                            });
                    }, 500);
                });

                // 4. Envoi du formulaire en AJAX pour rester sur la page (Ticket + Cooldown)
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = "⌛ Envoi en cours...";

                    const formData = new FormData(form);
                    fetch('/check_attendance', {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Succès : Masquage du formulaire et affichage du ticket
                            form.style.display = 'none';
                            badge.style.display = 'none';
                            ticket.style.display = 'block';
                            ticketDetails.innerHTML = `<strong>${infoName.textContent}</strong><br>Pointage effectué le ${new Date().toLocaleTimeString()}`;
                            
                            // Lancement du cooldown de 30 secondes
                            let timeLeft = 30;
                            const interval = setInterval(() => {
                                timeLeft--;
                                timerSpan.textContent = timeLeft;
                                if (timeLeft <= 0) {
                                    clearInterval(interval);
                                    ticket.style.display = 'none';
                                    form.style.display = 'flex';
                                    form.reset();
                                    submitBtn.innerHTML = "Valider ma présence";
                                    submitBtn.disabled = true; // Reste désactivé jusqu'au prochain matricule valide
                                    timerSpan.textContent = "30";
                                    badge.style.display = 'none';
                                }
                            }, 1000);
                        } else {
                            // Erreur retournée par le serveur
                            alert("❌ Erreur : " + data.message);
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = "Réessayer";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert("❌ Erreur technique. Vérifiez votre connexion.");
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = "Valider ma présence";
                    });
                });
            </script>

            <style>
                @keyframes slideDown {
                    from { opacity: 0; transform: translateY(-20px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            </style>

            <style>
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(-10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            </style>
        </main>
    </div>
</body>

</html>
