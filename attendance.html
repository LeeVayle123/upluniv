<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présence - UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: navy;
            --primary-dark: red;
            --text-main: #1e293b;
            --text-muted: red;
            --radius-lg: 16px;
            --radius-md: 14px;
            --transition: all 0.2s ease;
        }

        .logo-container {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .university-logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 650px;
            display: flex;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .side-panel {
            flex: 0.7;
            background: navy;
            padding: 24px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .brand-desc {
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .btn-outline {
            display: inline-flex;
            padding: 6px 16px;
            border: 1.5px solid rgb(252, 252, 252);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .btn-outline:hover {
            background: red;
            border-color: white;
        }

        .form-panel {
            flex: 1.3;
            padding: 24px 28px;
            background: white;
        }

        .form-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 550px) {
            .container {
                flex-direction: column;
                max-width: 350px;
            }

            .side-panel {
                padding: 20px;
                text-align: center;
                align-items: center;
            }

            .form-panel {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <aside class="side-panel">
            <h1 class="brand-title">UPL</h1>
            <p class="brand-desc">Scanner ou saisir votre matricule pour la présence.</p>
            <a href="/official_qr" class="btn-outline">📥 Afficher le Poster QR Officiel</a>
        </aside>

        <main class="form-panel">
            <h2 class="form-title">Présence</h2>
            
            <!-- Zone d'affichage des infos de l'étudiant trouvées via AJAX -->
            <div id="student-info-badge" style="display: none; background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid navy;">
                <p id="info-name" style="font-weight: 700; font-size: 0.9rem; color: navy;"></p>
                <p id="info-promo" style="font-size: 0.75rem; color: #64748b;"></p>
            </div>

            <form action="/check_attendance" method="post" id="attendance-form" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="hidden" name="device_signature" id="device_signature">
                
                <div class="form-group">
                    <label class="form-label" for="matricule">Matricule</label>
                    <input type="text" id="matricule" name="matricule" class="form-input" required
                        placeholder="Ex: 24-1234" autofocus autocomplete="off">
                </div>

                <!-- Sélection du type : ENTRÉE (arrivée en cours) ou SORTIE (départ) -->
                <div class="form-group">
                    <label class="form-label" for="type_presence">Type de pointage</label>
                    <select id="type_presence" name="type_presence" class="form-input">
                        <option value="Entrée">✅ Entrée</option>
                        <option value="Sortie">🚪 Sortie</option>
                    </select>
                </div>

                <div id="form-loading" style="display: none; text-align: center; font-size: 0.75rem; color: navy;">
                    <span>🔍 Vérification du matricule...</span>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn" disabled>Valider la présence</button>
            </form>

            <script>
                // 1. Génération de la signature de l'appareil (Fingerprint simple)
                function generateDeviceSignature() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const txt = 'UPL-Attendance-Fingerprint';
                    ctx.textBaseline = "top";
                    ctx.font = "14px 'Arial'";
                    ctx.fillText(txt, 2, 2);
                    const canvasData = canvas.toDataURL();
                    
                    // Hash simple de la data URL et d'autres infos
                    const rawSignature = navigator.userAgent + screen.width + screen.height + canvasData;
                    let hash = 0;
                    for (let i = 0; i < rawSignature.length; i++) {
                        const char = rawSignature.charCodeAt(i);
                        hash = ((hash << 5) - hash) + char;
                        hash = hash & hash; // Convert to 32bit integer
                    }
                    return "SIG-" + Math.abs(hash).toString(16);
                }

                document.getElementById('device_signature').value = generateDeviceSignature();

                // 2. Recherche automatique de l'étudiant via le matricule
                const matriculeInput = document.getElementById('matricule');
                const badge = document.getElementById('student-info-badge');
                const infoName = document.getElementById('info-name');
                const infoPromo = document.getElementById('info-promo');
                const submitBtn = document.getElementById('submit-btn');
                const loading = document.getElementById('form-loading');

                let lookupTimeout;

                matriculeInput.addEventListener('input', function() {
                    const matricule = this.value.trim();
                    clearTimeout(lookupTimeout);

                    if (matricule.length < 3) {
                        badge.style.display = 'none';
                        submitBtn.disabled = true;
                        return;
                    }

                    lookupTimeout = setTimeout(() => {
                        loading.style.display = 'block';
                        fetch(`/api/student/${matricule}`)
                            .then(response => {
                                if (!response.ok) throw new Error('Non trouvé');
                                return response.json();
                            })
                            .then(data => {
                                loading.style.display = 'none';
                                infoName.textContent = `${data.nom} ${data.postnom} ${data.prenom}`;
                                infoPromo.textContent = `${data.promotion} | ${data.faculte}`;
                                badge.style.display = 'block';
                                submitBtn.disabled = false;
                                // Animation subtile
                                badge.style.animation = 'fadeIn 0.3s ease-out';
                            })
                            .catch(err => {
                                loading.style.display = 'none';
                                badge.style.display = 'none';
                                submitBtn.disabled = true;
                            });
                    }, 500); // Délai pour ne pas saturer le serveur
                });
            </script>

            <style>
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(-10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            </style>
        </main>
    </div>
</body>

</html>
