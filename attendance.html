<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présence - UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: navy;
            --primary-dark: red;
            --text-main: #1e293b;
            --text-muted: red;
            --radius-lg: 16px;
            --radius-md: 14px;
            --transition: all 0.2s ease;
        }

        .conteneur-logo {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .logo-universitaire {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text-main);
        }

        .Conteneur {
            width: 100%;
            max-width: 550px;
            display: flex;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .panneau-lateral {
            flex: 0.6;
            background: navy;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .titre-marque {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .description-marque {
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .bouton-contour {
            display: inline-flex;
            padding: 6px 16px;
            border: 1.5px solid rgb(252, 252, 252);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .bouton-contour:hover {
            background: red;
            border-color: white;
        }

        .panneau-formulaire {
            flex: 1.4;
            padding: 20px 24px;
            background: white;
        }

        .titre-formulaire {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .groupe-formulaire {
            margin-bottom: 8px;
        }

        .etiquette-formulaire {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .champ-formulaire {
            width: 100%;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 11px;
            font-family: inherit;
            transition: var(--transition);
        }

        .champ-formulaire:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .bouton-validation {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .bouton-validation:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        @media (max-width: 550px) {
            .Conteneur {
                flex-direction: column;
                max-width: 350px;
            }

            .panneau-lateral {
                padding: 20px;
                text-align: center;
                align-items: center;
            }

            .panneau-formulaire {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="Conteneur">
        <aside class="panneau-lateral">
            <div class="conteneur-logo">
                <img src="{{ url_for('static', filename='logo_upl.png') }}" class="logo-universitaire" alt="Logo UPL">
            </div>
            <h1 class="titre-marque" style="font-size: 1.2rem; margin-bottom: 4px;">UPL</h1>
            <p class="description-marque" style="font-size: 0.75rem;">Scan or enter your matricule.</p>
        </aside>

        <main class="panneau-formulaire">
            <h2 class="titre-formulaire">Attendance</h2>

            <!-- Zone d'affichage des infos de l'étudiant trouvées via AJAX -->
            <div id="student-info-badge"
                style="display: none; background: #f1f5f9; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid navy;">
                <p id="info-name" style="font-weight: 700; font-size: 0.82rem; color: navy;"></p>
                <p id="info-promo" style="font-size: 0.7rem; color: #64748b;"></p>
            </div>

            <!-- Message de succès (Ticket) -->
            <div id="success-ticket"
                style="display: none; background: #dcfce7; padding: 15px; border-radius: 12px; border: 2px solid #16a34a; text-align: center; margin-bottom: 15px; animation: slideDown 0.4s ease-out;">
                <div style="font-size: 1.8rem; margin-bottom: 6px;">✅</div>
                <h3 style="color: #15803d; margin-bottom: 4px; font-size: 1rem;">Success!</h3>
                <p id="ticket-details" style="font-size: 0.75rem; color: #166534;"></p>
                <div style="margin-top: 10px; font-size: 0.7rem; color: #15803d; font-weight: 600;">
                    Next scan in : <span id="cooldown-timer">30</span>s
                </div>
            </div>

            <!-- Section Contrôle Aléatoire (PIN) -->
            <div id="random-check-zone" style="display: none; background: #fff7ed; padding: 15px; border-radius: 12px; border: 2px solid #ea580c; text-align: center; margin-bottom: 12px;">
                <h3 style="color: #9a3412; margin-bottom: 6px; font-size: 0.95rem;">Vérification 🛡️</h3>
                <p style="font-size: 0.75rem; color: #c2410c; margin-bottom: 10px;">Saisissez le code PIN du professeur.</p>
                <div style="display: flex; gap: 8px; justify-content: center;">
                    <input type="text" id="pin_value" maxlength="4" placeholder="0000" style="width: 70px; text-align: center; padding: 8px; border: 2px solid #fdba74; border-radius: 8px; font-size: 1rem; font-weight: bold;">
                    <button type="button" id="verify-pin-btn" class="bouton-validation" style="width: auto; padding: 8px 16px; background: #ea580c; font-size: 0.8rem;">OK</button>
                </div>
                <p id="pin-status" style="margin-top: 8px; font-size: 0.7rem; font-weight: 600;"></p>
            </div>

            <form action="/check_attendance" method="post" id="attendance-form"
                style="display: flex; flex-direction: column; gap: 10px;">
                <input type="hidden" name="device_signature" id="device_signature">
                <input type="hidden" name="latitude" id="latitude">
                <input type="hidden" name="longitude" id="longitude">
                <input type="hidden" name="accuracy_meters" id="accuracy_meters">

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="auditorium_code">Auditoire / Salle</label>
                    <select id="auditorium_code" name="auditorium_code" class="champ-formulaire" required>
                        <option value="" disabled selected>Choisir l'auditoire...</option>
                        <option value="EC-101">EC-101</option>
                        <option value="D-101">D-101</option>
                        <option value="B-101">B-101</option>
                        <option value="IF-301">IF-301</option>
                        <option value="IF-101">IF-101</option>
                        <option value="IF-302">IF-302</option>
                        <option value="IF-102">IF-102</option>
                        <option value="IF-304">IF-304</option>
                    </select>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="matricule">Matricule</label>
                    <input type="text" id="matricule" name="matricule" class="champ-formulaire" required
                        placeholder="Attente de localisation..." disabled autofocus autocomplete="off">
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="type_presence">Type de pointage</label>
                    <select id="type_presence" name="type_presence" class="champ-formulaire">
                        <option value="Entrée">Entrée</option>
                        <option value="Sortie">Sortie</option>
                    </select>
                </div>

                <div id="gps-status" style="font-size: 0.7rem; color: #64748b; margin-bottom: 5px;">
                    📍 Location in progress...
                </div>

                <div id="form-loading" style="display: none; text-align: center; font-size: 0.75rem; color: navy;">
                    <span>🔍 Checking...</span>
                </div>

                <button type="submit" class="bouton-validation" id="submit-btn" disabled>Validate attendance</button>
            </form>
        </main>

        <script>
            // 1. Géolocalisation
            let gpsSuccess = false;

            if ("geolocation" in navigator) {
                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(function (position) {
                    gpsSuccess = true;
                    document.getElementById('latitude').value = position.coords.latitude;
                    document.getElementById('longitude').value = position.coords.longitude;
                    document.getElementById('accuracy_meters').value = position.coords.accuracy;
                    
                    const status = document.getElementById('gps-status');
                    status.innerHTML = "📍 Localisation capturée avec succès";
                    status.style.color = "#16a34a";
                    status.style.fontWeight = "bold";

                    // Activer le champ matricule une fois localisé
                    const matInput = document.getElementById('matricule');
                    matInput.disabled = false;
                    matInput.placeholder = "Ex: 2024000000";
                    matInput.focus();
                }, function (error) {
                    gpsSuccess = false;
                    const status = document.getElementById('gps-status');
                    status.innerHTML = "❌ ERREUR GPS : Localisation obligatoire pour pointer.";
                    status.style.color = "#dc2626";
                    status.style.background = "#fee2e2";
                    status.style.padding = "10px";
                    status.style.borderRadius = "8px";
                    status.style.fontWeight = "bold";
                    
                    alert("Attention : Vous devez activer le GPS et autoriser la localisation pour remplir ce formulaire.");
                }, options);
            } else {
                alert("Votre navigateur ne supporte pas la géolocalisation. Impossible de pointer.");
            }

            // 2. Signature de l'appareil
            function generateDeviceSignature() {
                return "SIG-" + Math.random().toString(16).slice(2, 10).toUpperCase();
            }
            document.getElementById('device_signature').value = generateDeviceSignature();

            // 3. Recherche étudiant et Cooldown
            const matriculeInput = document.getElementById('matricule');
            const badge = document.getElementById('student-info-badge');
            const infoName = document.getElementById('info-name');
            const infoPromo = document.getElementById('info-promo');
            const submitBtn = document.getElementById('submit-btn');
            const loading = document.getElementById('form-loading');
            const form = document.getElementById('attendance-form');
            const ticket = document.getElementById('success-ticket');
            const ticketDetails = document.getElementById('ticket-details');
            const timerSpan = document.getElementById('cooldown-timer');

            let lookupTimeout;

            matriculeInput.addEventListener('input', function () {
                const matricule = this.value.trim();
                clearTimeout(lookupTimeout);
                if (matricule.length < 3) {
                    badge.style.display = 'none';
                    submitBtn.disabled = true;
                    return;
                }

                //le code de timeout en bas; 
                // Attend un délai avant de lancer une recherche.
                //Affiche un indicateur de chargement.
                //Récupère les infos d’un étudiant via une API (/api/student/{matricule}).
                //Met à jour l’interface avec les données reçues (nom, prénom, promotion, faculté).
                //Active le bouton de soumission une fois les infos disponibles.

                lookupTimeout = setTimeout(() => {
                    loading.style.display = 'block';
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = "🔍 Searching...";
                    
                    // Reset status to avoid confusion
                    const status = document.getElementById('gps-status');
                    if (status.innerHTML.includes("❌")) {
                        status.style.display = 'none';
                    }
                    fetch(`/api/student/${encodeURIComponent(matricule)}`)
                        .then(async res => {
                            const data = await res.json();
                            if (!res.ok) {
                                if (res.status === 404) throw new Error("Étudiant non trouvé");
                                throw new Error(data.error || "Erreur serveur (HTTP " + res.status + ")");
                            }
                            return data;
                        })
                        .then(data => {
                            loading.style.display = 'none';

                            // Mise à jour des informations
                            infoName.textContent = `${data.nom} ${data.prenom}`;

                            // Logique de suggestion de type de pointage
                            const typeSelect = document.getElementById('type_presence');
                            let statusText = `${data.promotion} | ${data.faculte}`;

                            if (data.count_today >= 4) {
                                statusText += " | Done for today";
                                submitBtn.disabled = true;
                                submitBtn.innerHTML = "Limite atteinte";
                            } else {
                                if (data.last_type === 'Entrée') {
                                    typeSelect.value = 'Sortie';
                                    statusText += " | Currently in class";
                                } else {
                                    typeSelect.value = 'Entrée';
                                    statusText += " | Outside class";
                                }
                                submitBtn.disabled = false;
                                submitBtn.innerHTML = "Validate my attendance";
                            }

                            infoPromo.textContent = statusText;
                            badge.style.display = 'block';

                            // GESTION DU CONTRÔLE ALÉATOIRE
                            if (data.pending_check) {
                                document.getElementById('random-check-zone').style.display = 'block';
                                document.getElementById('attendance-form').style.display = 'none';
                                
                                // Action de vérification du PIN
                                document.getElementById('verify-pin-btn').onclick = function() {
                                    const pin = document.getElementById('pin_value').value;
                                    const statusMsg = document.getElementById('pin-status');
                                    
                                    fetch('/api/attendance/check/respond', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({
                                            check_id: data.pending_check.id,
                                            value: pin
                                        })
                                    })
                                    .then(r => r.json())
                                    .then(res => {
                                        if (res.result === 'SUCCESS') {
                                            statusMsg.innerHTML = "✅ Vérification réussie !";
                                            statusMsg.style.color = "green";
                                            setTimeout(() => {
                                                document.getElementById('random-check-zone').style.display = 'none';
                                                document.getElementById('attendance-form').style.display = 'flex';
                                            }, 1500);
                                        } else {
                                            statusMsg.innerHTML = "❌ Code incorrect. Réessayez.";
                                            statusMsg.style.color = "red";
                                        }
                                    });
                                };
                            }
                        })
                        .catch((error) => {
                            loading.style.display = 'none';
                            badge.style.display = 'none';
                            submitBtn.disabled = true;
                            submitBtn.innerHTML = "Validate my attendance";
                            
                            // Affichage de l'erreur dans la zone de statut
                            const status = document.getElementById('gps-status');
                            status.innerHTML = "❌ Recherche échouée : " + (error.message || "Erreur inconnue");
                            status.style.color = "#dc2626";
                            status.style.background = "#fee2e2";
                            status.style.padding = "10px";
                            status.style.borderRadius = "8px";
                            status.style.display = 'block';
                        });
                }, 500);
            });

            // 4. Envoi du formulaire en AJAX pour rester sur la page (Ticket + Cooldown)
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.innerHTML = "⌛ Sending...";

                const formData = new FormData(form);
                fetch('/check_attendance', {
                    method: 'POST',
                    body: formData
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Succès : Masquage du formulaire et affichage du ticket
                            form.style.display = 'none';
                            badge.style.display = 'none';
                            ticket.style.display = 'block';
                            const typeMsg = formData.get('type_presence') === 'Entrée' ? "Entrée confirmée" : "Sortie confirmée";
                            ticketDetails.innerHTML = `<strong>${infoName.textContent}</strong><br>${typeMsg} à ${new Date().toLocaleTimeString()}<br><br><em>Votre session est enregistrée.</em>`;

                            // Lancement du cooldown de 20 secondes avant de permettre un nouveau scan
                            let timeLeft = 20;
                            const interval = setInterval(() => {
                                timeLeft--;
                                timerSpan.textContent = timeLeft;
                                if (timeLeft <= 0) {
                                    clearInterval(interval);
                                    ticket.style.display = 'none';
                                    form.style.display = 'flex';
                                    form.reset();
                                    submitBtn.innerHTML = "Validate my attendance";
                                    submitBtn.disabled = true;
                                    timerSpan.textContent = "20";
                                    badge.style.display = 'none';
                                }
                            }, 1000);
                        } else {
                            // Erreur retournée par le serveur
                            alert("❌ error : " + data.message);
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = "Retry";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert("❌ Technical error. Check your connection.");
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = "Validate my presence";
                    });
            });
        </script>

        <style>
            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>

        <style>
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
        </main>
    </div>
</body>

</html>
