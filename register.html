<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Étudiant - UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: navy;
            --primary-dark: navy;
            --secondary: red;
            --text-main: #1e293b;
            --text-muted: #64748b;

            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.2s ease;
        }

        .conteneur-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
            width: 140px;
            height: 140px;
        }

        .svg-circular-text {
            width: 100%;
            height: 100%;
        }

        .logo-universitaire {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .slogan {
            margin: 12px 0;
            font-size: 0.75rem;
            line-height: 1.4;
            opacity: 0.9;
        }

        .slogan p {
            margin: 4px 0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text-main);
        }

        .conteneur-principal {
            width: 90%;
            max-width: 720px;
            display: flex;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .panneau-lateral {
            flex: 0.6;
            background: linear-gradient(160deg, var(--primary) 0%, #000040 100%);
            padding: 25px 8px 10px 8px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
        }

        .titre-panneau {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .description-marque {
            font-size: 0.85rem;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        /*fais partie de modificatioon du bouton se connecter*/
        .bouton-hors-ligne {
            display: inline-flex;
            padding: 8px 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
            width: fit-content;
        }

        /*modification du bouton se conncter pour le hover, et la couleur en roiuge*/
        .bouton-hors-ligne:hover {
            background: red;
            border-color: white;
        }

        .formulaire-interne {
            flex: 1.4;
            padding: 20px 24px;
            background: white;
        }

        .formulaire-principal {
            margin-bottom: 12px;
        }

        .titre-formulaire {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .sous-titre-formulaire {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .grille-formulaire {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .groupe-formulaire {
            margin-bottom: 2px;
        }

        .groupe-formulaire.complet {
            grid-column: span 2;
        }

        .etiquette-formulaire {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: var(--text-main);
        }

        .champ-formulaire {
            width: 100%;
            padding: 6px 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text-main);
            transition: var(--transition);
        }

        .champ-formulaire:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .bouton-validation {
            grid-column: span 2;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .bouton-validation:hover,
        .bouton-validation:active {
            background: var(--secondary) !important;
            transform: translateY(-1px);
        }

        .pied-de-page-formulaire {
            margin-top: 12px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .boutons-bas {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            gap: 12px;
        }

        .bouton-bas {
            flex: 1;
            display: inline-flex;
            padding: 8px 12px;
            border: 1.5px solid var(--primary);
            border-radius: 10px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: var(--transition);
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        .bouton-bas:hover,
        .bouton-bas:active {
            background: var(--secondary) !important;
            border-color: var(--secondary) !important;
            color: white !important;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            margin-top: 3px;
        }

        .radio-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }

        .radio-option:hover {
            border-color: var(--primary);
            background: rgba(0, 0, 128, 0.05);
        }

        .radio-option input[type="radio"]:checked+.radio-label {
            color: var(--primary);
            font-weight: 700;
        }

        .radio-option input[type="radio"] {
            accent-color: var(--primary);
        }

        .radio-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
        }

        @media (max-width: 700px) {
            .conteneur-principal {
                flex-direction: column;
                max-width: 450px;
            }

            .panneau-lateral {
                padding: 16px;
                text-align: center;
                align-items: center;
            }

            .formulaire-interne {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .grille-formulaire {
                grid-template-columns: 1fr;
            }

            .groupe-formulaire.complet,
            .bouton-validation {
                grid-column: span 1;
            }

            .boutons-bas {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="conteneur-principal">
        <aside class="panneau-lateral">
            <div class="conteneur-logo">
                <svg viewBox="0 0 100 100" class="svg-circular-text">
                    <defs>
                        <path id="circlePath" d="M 50, 50 m -38, 0 a 38, 38 0 1, 1 76, 0 a 38, 38 0 1, 1 -76, 0" />
                    </defs>
                    <text fill="white" font-weight="800"
                        style="font-size: 5.5px; text-transform: uppercase; letter-spacing: 0.8px;">
                        <textPath xlink:href="#circlePath">
                            PROTESTANT UNIVERSITY OF LUBUMBASHI • PROTESTANT UNIVERSITY OF LUBUMBASHI •
                        </textPath>
                    </text>
                </svg>
                <img src="{{ url_for('static', filename='logo_upl.png') }}" class="logo-universitaire" alt="Logo UPL">
            </div>
            <div class="slogan">
                <p>VOUS CONNAÎTREZ LA VÉRITÉ ET LA VÉRITÉ VOUS AFFRANCHIRA</p>
                <p>YOU SHALL KNOW THE TRUTH, AND THE TRUTH SHALL SET YOU FREE</p>
            </div>
        </aside>

        <main class="formulaire-interne">

            <div class="formulaire-principal">
                <h2 class="titre-formulaire">Registration</h2>
                <p class="sous-titre-formulaire">Fill in the form to create your account.</p>
            </div>

            <form action="/register" method="post" class="grille-formulaire">
                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="matricule">Matricule</label>
                    <input type="text" id="matricule" name="matricule" class="champ-formulaire" required
                        placeholder="Ex: 123/24">
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="sexe">Sexe</label>
                    <select id="sexe" name="sexe" class="champ-formulaire" required>
                        <option value="">Sélectionner</option>
                        <option value="M">M</option>
                        <option value="F">F</option>
                    </select>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="nom">Name</label>
                    <input type="text" id="nom" name="nom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="postnom">Postname</label>
                    <input type="text" id="postnom" name="postnom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="prenom">Firstname</label>
                    <input type="text" id="prenom" name="prenom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire complet">
                    <label class="etiquette-formulaire">Choose your Path</label>
                    <div class="radio-group" style="display: flex; gap: 15px; margin-top: 5px;">
                        <label class="radio-option">
                            <input type="radio" name="parcours" value="IAGE" onchange="updateFields()" required>
                            <span class="radio-label">IAGE</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="parcours" value="TECHNOLOGIE" onchange="updateFields()" required>
                            <span class="radio-label">TECHNOLOGY</span>
                        </label>
                    </div>
                </div>

                <div id="promotionDiv" style="display:none;" class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="promotion">Promotion</label>
                    <select id="promotion" name="promotion" class="champ-formulaire" required></select>
                </div>

                <div id="filiereDiv" style="display:none;" class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="filiere">Filière</label>
                    <select id="filiere" name="filiere" class="champ-formulaire" required>
                        <option value="IA">IA</option>
                        <option value="GL">GL</option>
                        <option value="SI">SI</option>
                    </select>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="faculte">Faculté</label>
                    <select id="faculte" name="faculte" class="champ-formulaire" required>
                        <option value="Faculté de sciences informatiques">Informatique</option>
                        <option value="Polytechnique">Polytechnique</option>
                    </select>
                </div>


                <button type="submit" class="bouton-validation">S'inscrire</button>
            </form>

            <div class="boutons-bas">
                <a href="{{ url_for('admin_general_dashboard') }}" class="bouton-bas">
                    <i class="fa-solid fa-house" style="margin-right: 8px;"></i> Dashboard
                </a>
                <a href="/students" class="bouton-bas">Liste des étudiants</a>
            </div>

            <div class="pied-de-page-formulaire">
                <p>&copy; 2026 Protestante University of Lubumbashi</p>
            </div>
        </main>
    </div>

    <script>
        function updateFields() {
            var parcoursElement = document.querySelector('input[name="parcours"]:checked');
            var parcours = parcoursElement ? parcoursElement.value : '';
            var promotionDiv = document.getElementById('promotionDiv');
            var filiereDiv = document.getElementById('filiereDiv');
            var promotionSelect = document.getElementById('promotion');

            if (parcours === 'IAGE') {
                promotionDiv.style.display = 'block';
                filiereDiv.style.display = 'none';
                promotionSelect.innerHTML = `
                    <option value="Bac1">Bac 1</option>
                    <option value="Bac2">Bac 2</option>
                    <option value="Bac3">Bac 3</option>
                `;
            } else if (parcours === 'TECHNOLOGIE') {
                promotionDiv.style.display = 'block';
                filiereDiv.style.display = 'block';
                promotionSelect.innerHTML = `
                    <option value="Bac1">Bac 1</option>
                    <option value="Bac2">Bac 2</option>
                    <option value="Bac3">Bac 3</option>
                    <option value="Bac4">Bac 4</option>
                `;
            } else {
                promotionDiv.style.display = 'none';
                filiereDiv.style.display = 'none';
            }
        }
    </script>
</body>

</html>
