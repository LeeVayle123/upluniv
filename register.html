<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Étudiant - UPL</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: navy;
            --primary-dark: navy;
            --text-main: #1e293b;
            --text-muted: #64748b;

            --radius-lg: 16px;
            --radius-md: 16px;
            --transition: all 0.2s ease;
        }

        .conteneur-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo-universitaire {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .conteneur-logo-form {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo-form {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #f1f5f9;
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.15);
            background: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: var(--text-main);
        }

        .conteneur-principal {

            width: 100%;
            max-width: 720px;
            display: flex;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .panneau-lateral {
            flex: 0.7;
            background: linear-gradient(160deg, navy 0%, navy 100%);
            padding: 32px 24px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .titre-panneau {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .description-marque {
            font-size: 0.9rem;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /*fais partie de modificatioon du bouton se connecter*/
        .bouton-hors-ligne {
            display: inline-flex;
            padding: 8px 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
            width: fit-content;
        }

        /*modification du bouton se conncter pour le hover, et la couleur en roiuge*/
        .bouton-hors-ligne:hover {
            background: red;
            border-color: white;
        }

        .formulaire-interne {
            flex: 1.3;
            padding: 28px 32px;
            background: white;
        }

        .formulaire-principal {
            margin-bottom: 20px;
        }

        .titre-formulaire {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sous-titre-formulaire {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .grille-formulaire {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .groupe-formulaire {
            margin-bottom: 4px;
        }

        .groupe-formulaire.complet {
            grid-column: span 2;
        }

        .etiquette-formulaire {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .champ-formulaire {
            width: 100%;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--text-main);
            transition: var(--transition);
        }

        .champ-formulaire:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .bouton-validation {
            grid-column: span 2;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: red;
            transform: translateY(-1px);
        }

        .pied-de-page-formulaire {
            margin-top: 16px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 700px) {
            .conteneur-principal {
                flex-direction: column;
                max-width: 400px;
            }

            .panneau-lateral {
                padding: 24px;
                text-align: center;
                align-items: center;
            }

            .formulaire-interne {
                padding: 24px;
            }
        }

        @media (max-width: 480px) {
            .grille-formulaire {
                grid-template-columns: 1fr;
            }

            .groupe-formulaire.complet,
            .bouton-validation {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <div class="conteneur-principal">
        <aside class="panneau-lateral">
            <div class="conteneur-logo">
                <img src="{{ url_for('static', filename='logo_upl.png') }}" class="logo-universitaire" alt="Logo UPL">
            </div>
            <h1 class="titre-panneau">Hello welcome</h1>
            <p class="description-marque">Don't have Account ?</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <!--<a href="/attendance" class="bouton-hors-ligne">Se connecter</a>-->
                <a href="/students" class="bouton-hors-ligne" text-align: center;
                    style="background: rgba(255,255,255,0.1);">Liste des étudiants</a>
            </div>
        </aside>

        <main class="formulaire-interne">
            <div class="conteneur-logo-form">
                <img src="{{ url_for('static', filename='logo_upl.png') }}" class="logo-form" alt="Logo UPL">
            </div>

            <div class="formulaire-principal">
                <h2 class="titre-formulaire">Registration</h2>
                <p class="sous-titre-formulaire">Fill in the form to create your account.</p>
            </div>

            <form action="/register" method="post" class="grille-formulaire">
                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="matricule">Matricule</label>
                    <input type="text" id="matricule" name="matricule" class="champ-formulaire" required
                        placeholder="Ex: 123/24">
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="sexe">Sexe</label>
                    <select id="sexe" name="sexe" class="champ-formulaire" required>
                        <option value="">Sélectionner</option>
                        <option value="M">M</option>
                        <option value="F">F</option>
                    </select>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="nom">Name</label>
                    <input type="text" id="nom" name="nom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="postnom">Postname</label>
                    <input type="text" id="postnom" name="postnom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="prenom">Firstname</label>
                    <input type="text" id="prenom" name="prenom" class="champ-formulaire" required>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="parcours">Path</label>
                    <select id="parcours" name="parcours" class="champ-formulaire" onchange="updateFields()" required>
                        <option value="">Select</option>
                        <option value="IAGE">IAGE</option>
                        <option value="TECHNOLOGIE">TECHNOLOGY</option>
                    </select>
                </div>

                <div id="promotionDiv" style="display:none;" class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="promotion">Promotion</label>
                    <select id="promotion" name="promotion" class="champ-formulaire" required></select>
                </div>

                <div id="filiereDiv" style="display:none;" class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="filiere">Filière</label>
                    <select id="filiere" name="filiere" class="champ-formulaire" required>
                        <option value="IA">IA</option>
                        <option value="GL">GL</option>
                        <option value="SI">SI</option>
                    </select>
                </div>

                <div class="groupe-formulaire">
                    <label class="etiquette-formulaire" for="faculte">Faculté</label>
                    <select id="faculte" name="faculte" class="champ-formulaire" required>
                        <option value="Faculté de sciences informatiques">Informatique</option>
                        <option value="Polytechnique">Polytechnique</option>
                    </select>
                </div>


                <button type="submit" class="bouton-validation">S'inscrire</button>
            </form>

            <div class="pied-de-page-formulaire">
                <p>&copy; 2026 Protestante University of Lubumbashi</p>
            </div>
        </main>
    </div>

    <script>
        function updateFields() {
            var parcours = document.getElementById('parcours').value;
            var promotionDiv = document.getElementById('promotionDiv');
            var filiereDiv = document.getElementById('filiereDiv');
            var promotionSelect = document.getElementById('promotion');

            if (parcours === 'IAGE') {
                promotionDiv.style.display = 'block';
                filiereDiv.style.display = 'none';
                promotionSelect.innerHTML = `
                    <option value="Bac1">Bac 1</option>
                    <option value="Bac2">Bac 2</option>
                    <option value="Bac3">Bac 3</option>
                `;
            } else if (parcours === 'TECHNOLOGIE') {
                promotionDiv.style.display = 'block';
                filiereDiv.style.display = 'block';
                promotionSelect.innerHTML = `
                    <option value="Bac1">Bac 1</option>
                    <option value="Bac2">Bac 2</option>
                    <option value="Bac3">Bac 3</option>
                    <option value="Bac4">Bac 4</option>
                `;
            } else {
                promotionDiv.style.display = 'none';
                filiereDiv.style.display = 'none';
            }
        }
    </script>
</body>

</html>
